artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires parsing an Apache-style log and deriving three deterministic summary values."
solution_explanation = "Read each nonempty record, count all requests and distinct client IPs, and tally request paths to identify the most frequent path."
verification_explanation = "The verifier parses /app/report.json, checks its exact schema, and asserts the expected request count, unique IP count, and top path from the fixed input log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
